[platformio]
src_dir = .

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
test_ignore = *   ; tests run under native only

[env:native]
platform = native
test_framework = unity
; Mock headers satisfy all Arduino/AVR includes in the .ino.
; build_src_filter excludes the .ino from a separate compile — the test
; file includes it directly via #include "../../governor_350A.ino".
build_flags = -I test/mocks -std=c++14
build_src_filter = -<*>
