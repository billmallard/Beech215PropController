name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Python autobuild works out of the box
          - language: python
            build-mode: autobuild
          # Arduino .ino files have no Makefile/CMake, so autobuild fails.
          # We drive the build manually with arduino-cli instead.
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # ── Python: let autobuild handle it ─────────────────────────────────────
      - name: Autobuild (Python)
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      # ── C/C++ (Arduino): manual build via arduino-cli ───────────────────────
      - name: Install Arduino CLI
        if: matrix.build-mode == 'manual'
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install AVR platform
        if: matrix.build-mode == 'manual'
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Build Arduino sketch
        if: matrix.build-mode == 'manual'
        run: |
          # atmega328old = genuine Nano with old bootloader (most common clone)
          arduino-cli compile \
            --fqbn arduino:avr:nano:cpu=atmega328old \
            firmware/governor_350A/governor_350A.ino

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
