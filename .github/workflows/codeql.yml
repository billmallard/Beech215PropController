name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (c-cpp)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install AVR platform
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install required libraries
        run: |
          arduino-cli lib install "Adafruit GFX Library" "Adafruit SSD1306"

      - name: Build Arduino sketch
        run: |
          # atmega328old = genuine Nano with old bootloader (most common clone)
          arduino-cli compile \
            --fqbn arduino:avr:nano:cpu=atmega328old \
            firmware/governor_350A/governor_350A.ino

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
